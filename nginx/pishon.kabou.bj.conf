# Nginx Reverse Proxy - VoIP Call Center
# Domain: pishon.kabou.bj
#
# Architecture:
#   https://pishon.kabou.bj/           -> http://127.0.0.1:5173 (Frontend Vite)
#   https://pishon.kabou.bj/api/*      -> http://127.0.0.1:3001 (Backend NestJS)
#   https://pishon.kabou.bj/socket.io/* -> http://127.0.0.1:3001 (WebSocket)
#   Asterisk WSS (port 8089) gère son propre SSL

# =============================================================================
# Upstreams
# =============================================================================
upstream frontend {
    server 127.0.0.1:5173;
    keepalive 32;
}

upstream api_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# =============================================================================
# Rate Limiting
# =============================================================================
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# =============================================================================
# HTTP -> HTTPS Redirect
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name pishon.kabou.bj;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# Main HTTPS Server (Port 443)
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pishon.kabou.bj;

    # -------------------------------------------------------------------------
    # SSL Configuration
    # -------------------------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/pishon.kabou.bj/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pishon.kabou.bj/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # -------------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/pishon.access.log;
    error_log /var/log/nginx/pishon.error.log;

    # -------------------------------------------------------------------------
    # General Settings
    # -------------------------------------------------------------------------
    client_max_body_size 50M;

    # =========================================================================
    # API Backend (NestJS) - /api/*
    # =========================================================================
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # =========================================================================
    # WebSocket Socket.IO (NestJS) - /socket.io/*
    # =========================================================================
    location /socket.io/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for WebSocket connections
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # Disable buffering for real-time
        proxy_buffering off;
    }

    # =========================================================================
    # Frontend (Vite dev server) - /*
    # =========================================================================
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Vite HMR (Hot Module Replacement)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # =========================================================================
    # Health Check Endpoint
    # =========================================================================
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
