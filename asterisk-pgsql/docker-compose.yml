version: "3"
services:
  asterisk:
    image: dukh/asterisk:17-pjsip-pgsql-odbc
    container_name: asterisk
    ports:
      - "5060:5060/udp"
    volumes:
      - ./etc/asterisk:/etc/asterisk
    depends_on:
      - db
    networks:
      - asterisk-network

  db:
    image: postgres:12
    container_name: db
    environment:
      POSTGRES_DB: asterisk
      POSTGRES_USER: asterisk
      POSTGRES_PASSWORD: your_strong_password
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/10-schema.sql
      - ./init.sql:/docker-entrypoint-initdb.d/20-init.sql
    networks:
      - asterisk-network

networks:
  asterisk-network:
    driver: bridge    
