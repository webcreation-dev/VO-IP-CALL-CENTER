services:
  # ============================================
  # ASTERISK PBX
  # ============================================
  asterisk:
    build: .
    container_name: asterisk
    environment:
      - AST_MODULE_LOAD_PRIORITY=1
    volumes:
      - "./etc/asterisk:/etc/asterisk"
      - "/etc/asterisk/certs:/etc/asterisk/keys:ro"
      - "./log/asterisk:/var/log/asterisk"
      - "./odbc.ini:/etc/odbc.ini"
      - "./odbcinst.ini:/etc/odbcinst.ini"
      - "./log/supervisor:/var/log/supervisor"
    ports:
      - "5038:5038" # AMI
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5061:5061/udp"
      - "5061:5061/tcp"
      - "8088:8088" # HTTP
      - "8089:8089" # HTTPS / WSS
      - "10000-10200:10000-10200/udp" # RTP
    depends_on:
      api-db:
        condition: service_healthy
    restart: always
    networks:
      - asterisk-network
    #network_mode: host

  # ============================================
  # DATABASE UNIFIÉE (Asterisk + API)
  # Utilisée par Asterisk (ODBC) ET le backend NestJS
  # ============================================
  api-db:
    image: postgres:14
    container_name: asterisk-api-postgres
    environment:
      POSTGRES_DB: "asterisk_api"
      POSTGRES_USER: "api_user"
      POSTGRES_PASSWORD: "ApiSecurePass2025!"
    volumes:
      - asterisk-api-pgdata:/var/lib/postgresql/data
      - "./init-api-db.sql:/docker-entrypoint-initdb.d/01-init-api-db.sql:ro"
    ports:
      - "5432:5432"  # Port standard maintenant (ancien db désactivé)
    restart: always
    networks:
      - asterisk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_user -d asterisk_api"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # REDIS (Cache pour statistiques temps réel)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: asterisk-redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - asterisk-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  asterisk-network:
    driver: bridge

volumes:
  asterisk-api-pgdata:
    driver: local
