version: "3.7"

services:
  asterisk:
    image: andrius/asterisk
    volumes:
      - "./etc/asterisk/:/etc/asterisk:rw"
      - "./odbc.ini:/etc/odbc.ini"
      - "./odbcinst.ini:/etc/odbcinst.ini"
    ports:
      - "5060:5060/tcp"
      - "5060:5060/udp"
      - "5038:5038"
      - "8088:8088"
      - "10000-11000:10000-11000/udp"
    depends_on:
      - db
    networks:
      - asterisk-net

  db:
    image: postgres:12
    environment:
      POSTGRES_DB: asterisk
      POSTGRES_USER: asterisk
      POSTGRES_PASSWORD: your_strong_password
    volumes:
      - "pgdata:/var/lib/postgresql/data"
      - "./init.sql:/docker-entrypoint-initdb.d/init.sql:ro"
      - "./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro"
    restart: always
    networks:
      - asterisk-net

networks:
  asterisk-net:
 
volumes:
  pgdata:
