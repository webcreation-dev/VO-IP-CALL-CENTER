services:
  api:
    build: ../ # Pointe vers le dossier asterisk (parent)
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=asterisk
      - DB_PASSWORD=Obelix
      - DB_NAME=asterisk
      - AMI_HOST=asterisk
      - AMI_PORT=5038
      - AMI_USER=admin
      - AMI_PASSWORD=Sp33Dd14L
    depends_on:
      - db
      - asterisk
    restart: always
    volumes:
      - ../:/app # En développement pour hot-reload
      - /app/node_modules # Exclure node_modules du volume
  asterisk:
    build: .
    environment:
      - AST_MODULE_LOAD_PRIORITY=1
    volumes:
      - "./etc/asterisk:/etc/asterisk"
      - "/etc/asterisk/certs:/etc/asterisk/keys:ro"
      - "./log/asterisk:/var/log/asterisk"
      - "./odbc.ini:/etc/odbc.ini"
      - "./odbcinst.ini:/etc/odbcinst.ini"
      - "./log/supervisor:/var/log/supervisor"
    ports:
      - "5038:5038" # AMI
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5061:5061/udp"
      - "5061:5061/tcp"
      - "8088:8088" # HTTP
      - "8089:8089" # HTTPS / WSS
      - "10000-10200:10000-10200/udp" # RTP
    restart: always
    #network_mode: host

  db:
    image: ${POSTGRES_IMAGE:-postgres}:${POSTGRES_IMAGE_VERSION:-12}
    environment:
      POSTGRES_DB: "asterisk"
      POSTGRES_USER: "asterisk"
      POSTGRES_PASSWORD: "Obelix"
    volumes:
      - "./.pgdata:/var/lib/postgresql/data"
      - "./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro"
      - "./INIT_TOUT_EN_UN.sql:/docker-entrypoint-initdb.d/02-INIT_TOUT_EN_UN.sql:ro"
    ports:
      - "5432:5432"
    restart: always
