[asterisk-connector]
Description         = PostgreSQL connection to '${PGDATABASE}' database for Asterisk
Driver              = PostgreSQL
Database            = ${PGDATABASE}
Servername          = ${PGHOST}
UserName            = ${PGUSER}
Password            = ${PGPASSWORD}
Port                = ${PGPORT}
Protocol            = 8.1
ReadOnly            = No
RowVersioning       = No
ShowSystemTables    = No
ShowOidColumn       = No
FakeOidIndex        = No
ConnSettings        = 
