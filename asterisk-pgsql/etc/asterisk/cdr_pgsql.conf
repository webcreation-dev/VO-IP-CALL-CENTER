; Configuration for CDR logging to PostgreSQL
;
; Cette configuration permet d'enregistrer les CDR dans PostgreSQL
; avec support du multi-tenant via tenant_id

[global]
hostname=db
port=5432
dbname=asterisk
user=asterisk
password=Obelix
table=cdr
encoding=UTF8
timezone=UTC

; Active l'enregistrement automatique des CDR
; Asterisk va automatiquement insérer les enregistrements dans la table 'cdr'

