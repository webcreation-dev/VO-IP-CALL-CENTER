; =====================================================
; PJSIP Configuration - REALTIME MODE
; =====================================================
; TOUTE la configuration PJSIP est chargée depuis PostgreSQL
; Les transports, endpoints, auths, aors sont dans la base
; Voir: asterisk-pgsql/init.sql pour la configuration
; =====================================================
; SAUF :
; - Les TRANSPORTS sont configurés ci-dessous
; - Les REGISTRATIONS SIP TRUNK sont dans pjsip_wizard.conf
; =====================================================

; =====================================================
; TRANSPORT UDP
; =====================================================

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=
external_signaling_address=
