; Configuration CDR Adaptive ODBC pour PostgreSQL
;
; Ce fichier permet d'écrire les CDR (Call Detail Records) dans PostgreSQL
; via la connexion ODBC configurée dans res_odbc.conf
;
; La table cdr doit exister dans la base de données avec les colonnes appropriées
; Voir init-api-db.sql pour la structure de la table

[cdr_postgresql]
; Connexion ODBC à utiliser (définie dans res_odbc.conf)
connection=asterisk

; Table où écrire les CDR
table=cdr

; Schéma PostgreSQL (optionnel, défaut = public)
schema=public

; Alias pour mapper les noms de colonnes Asterisk vers les colonnes de la table
; Format: alias <nom_asterisk> => <nom_colonne_table>
alias start => calldate
alias answer => answerdate
alias end => enddate

; Les autres colonnes sont mappées automatiquement par nom:
; - accountcode => accountcode
; - src => src
; - dst => dst
; - dcontext => dcontext
; - clid => clid
; - channel => channel
; - dstchannel => dstchannel
; - lastapp => lastapp
; - lastdata => lastdata
; - duration => duration
; - billsec => billsec
; - disposition => disposition
; - amaflags => amaflags
; - uniqueid => uniqueid
; - userfield => userfield
; - peeraccount => peeraccount
; - linkedid => linkedid
; - sequence => sequence

; Note: La colonne tenant_id n'est pas automatiquement remplie par Asterisk.
; Elle doit être extraite du canal ou du contexte dans le dialplan
; et définie via Set(CDR(tenant_id)=X) avant la fin de l'appel.
