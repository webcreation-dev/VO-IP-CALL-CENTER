[settings]
; ===== PJSIP Realtime Configuration =====
; IMPORTANT: Using *_active views to filter deleted_at IS NULL
; This ensures Asterisk only sees active (non-deleted) endpoints
ps_endpoints => odbc,asterisk
ps_auths => odbc,asterisk
ps_aors => odbc,asterisk
;ps_domain_aliases => odbc,asterisk
;ps_endpoint_id_ips => odbc,asterisk
ps_contacts => odbc,asterisk
;ps_registrations => odbc,asterisk
ps_transports => odbc,asterisk

; ===== Dialplan Realtime Configuration =====
; Using extensions_active view to filter deleted extensions
extensions => odbc,asterisk

; ===== CDR Realtime Configuration =====
; CDR writes directly to table (no view needed)
cdr => odbc,asterisk

; ===== Queue Realtime Configuration =====
; Using *_active views to filter deleted queues
queues => odbc,asterisk
queue_members => odbc,asterisk

; ===== Music on Hold Realtime (Optional) =====
;musiconhold => odbc,asterisk

; ===== Voicemail RealtimOptional) =====
;voicemail => odbc,asterisk

; NOTES:
; - Toutes les configurations ci-dessus utilisent ODBC pour se connecter à PostgreSQL
; - Le nom "asterisk" fait référence à la connexion ODBC configurée dans res_odbc.conf
; - Les queues et queue_members sont complètement en realtime
; - Les modifications en base de données sont immédiatement prises en compte
