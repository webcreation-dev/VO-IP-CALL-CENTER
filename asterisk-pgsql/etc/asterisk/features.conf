;
; Configuration des fonctionnalités d'appel
; (transferts, enregistrement, parking, etc.)
;

[general]
; Temps d'attente entre les chiffres lors d'un transfert (en secondes)
transferdigittimeout => 3

; Son à jouer pour indiquer un transfert accompagné réussi
xfersound = beep

; Son à jouer pour indiquer un transfert échoué
xferfailsound = beeperr

; Extension pour intercepter un appel (*8 par défaut)
pickupexten = *8

; Son à jouer lors d'une interception réussie
pickupsound = beep

; Son à jouer lors d'une interception échouée
pickupfailsound = beeperr

; Temps maximum (ms) entre les chiffres pour l'activation d'une fonctionnalité
featuredigittimeout = 1500

; Son à jouer lorsque l'enregistrement échoue
recordingfailsound = beeperr

; Timeout pour la réponse lors d'un transfert accompagné (en secondes)
atxfernoanswertimeout = 20

; Si quelqu'un fait un transfert accompagné puis raccroche avant que la cible réponde,
; par défaut le système rappelle la personne qui a fait le transfert.
; Si mis à "yes", l'appel est directement transféré.
atxferdropcall = no

; Nombre de secondes entre les tentatives de rappel
atxferloopdelay = 10

; Nombre de tentatives de rappel
atxfercallbackretries = 2

; Nombre de tentatives de composition avant de retourner à l'appel original
transferdialattempts = 3

; Son à jouer lorsqu'un transfert échoue
transferretrysound = beep

; Son à jouer lorsqu'un transfert est invalide et qu'il n'y a plus de tentatives
transferinvalidsound = beeperr

; Touches pour gérer le transfert accompagné:
; *1 = annuler le transfert accompagné
atxferabort = *1

; *2 = compléter le transfert accompagné en quittant l'appel
atxfercomplete = *2

; *3 = compléter le transfert en restant dans l'appel (conférence à 3)
atxferthreeway = *3

; *4 = basculer entre les deux parties pendant un transfert accompagné
atxferswap = *4

[featuremap]
; =========================================
; Mappage des fonctionnalités DTMF
; =========================================
; NOTE: Pour utiliser ces fonctionnalités, vous DEVEZ définir les options
; appropriées dans l'application Dial() ou Queue():
; - T ou t pour les transferts
; - H ou h pour raccrocher
; - W ou w pour l'enregistrement (automon)
; - X ou x pour l'enregistrement (automixmon)
; - K ou k pour le parking

; #1 = Transfert aveugle
; L'appelant peut transférer l'appel sans parler d'abord au destinataire
blindxfer => #1

; *0 = Déconnecter l'appel
disconnect => *0

; *1 = Enregistrement à une touche (Monitor)
; Commence l'enregistrement de la conversation
automon => *1

; *2 = Transfert accompagné
; L'appelant peut parler au destinataire avant de transférer
atxfer => *2

; #72 = Parquer l'appel (parking)
; Met l'appel en attente et donne un numéro de parking
parkcall => #72

; *3 = Enregistrement à une touche (MixMonitor)
; Commence l'enregistrement de la conversation (version améliorée)
automixmon => *3

[applicationmap]
; =========================================
; Fonctionnalités dynamiques personnalisées
; =========================================
; Ces fonctionnalités doivent être activées via la variable DYNAMIC_FEATURES
; Exemple dans le dialplan:
;   Set(__DYNAMIC_FEATURES=pauserecord#resumerecord)
;
; Syntaxe:
; <NomFonction> => <Séquence_DTMF>,<ActivationSur>,<Application>[,<Arguments>][,<Classe_MOH>]
;
; ActivationSur peut être:
;   self  = exécuter sur le canal qui a activé la fonctionnalité
;   peer  = exécuter sur le canal opposé

; Mettre en pause l'enregistrement
pauserecord => *5,self,PauseMonitor

; Reprendre l'enregistrement
resumerecord => *6,self,UnPauseMonitor

; Exemple: jouer un message à l'autre partie
;playmessage => *8,peer,Playback,welcome

; =========================================
; NOTES IMPORTANTES:
; =========================================
; 1. Pour activer les transferts, utilisez l'option T ou t dans Dial():
;    - T: permet au APPELANT de transférer
;    - t: permet à l'APPELÉ de transférer
;    - Tt: permet aux deux de transférer
;    Exemple: Dial(PJSIP/${EXTEN},20,Tt)
;
; 2. Pour l'enregistrement automatique, utilisez W ou w dans Dial():
;    - W: enregistrement contrôlable par l'appelant
;    - w: enregistrement contrôlable par l'appelé
;    Exemple: Dial(PJSIP/${EXTEN},20,Ww)
;
; 3. Pour utiliser ces fonctionnalités dans une Queue:
;    Utilisez l'option 't' dans la commande Queue():
;    Queue(support_queue,t)
;
; 4. Les enregistrements seront sauvegardés dans:
;    /var/spool/asterisk/monitor/

