;
; AMI - The Asterisk Manager Interface
;
; Configuration pour l'API Node.js
;

[general]
enabled = yes
port = 5038
bindaddr = 0.0.0.0

; Afficher les connexions dans les logs
displayconnects = yes

; Permettre plusieurs connexions simultanées
allowmultiplelogin = yes

; Ajouter timestamp aux events
timestampevents = yes

;
; Utilisateur AMI pour l'API
;
[admin]
secret = Sp33Dd14L
deny = 0.0.0.0/0.0.0.0
permit = 172.18.0.0/255.255.0.0
permit = 127.0.0.1/255.255.255.0
read = system,call,log,verbose,agent,user,config,dtmf,reporting,cdr,dialplan,originate
write = system,call,agent,user,config,command,reporting,originate,message
writetimeout = 5000