;
; Configuration de la musique d'attente (Music On Hold)
; Ce fichier configure les différentes classes de musique que les appelants
; entendent lorsqu'ils sont en attente
;

[general]
; Utiliser une seule instance de classe MOH pour tous les utilisateurs
; Cela réduit la consommation CPU et mémoire
cachertclasses=yes

; Préférer la classe musicale définie par CHANNEL(musicclass)
; plutôt que celle définie par l'application (ex: queue)
preferchannelclass=yes

; =========================================
; Classe par défaut - Musique d'attente standard
; =========================================
[default]
mode=files
; Répertoire contenant les fichiers audio
; Par défaut, Asterisk cherche dans /var/lib/asterisk/moh/
directory=moh
; Ordre de lecture: aléatoire
sort=random
; Annonce à jouer avant la musique et entre chaque morceau
;announcement=queue-thankyou

; =========================================
; Classe pour la queue de support
; =========================================
[support-hold]
mode=files
directory=moh
sort=random
; Message d'accueil pour la file d'attente support
announcement=custom/support-welcome

; =========================================
; Classe pour la queue de ventes
; =========================================
[sales-hold]
mode=files
directory=moh
sort=alpha
; Message d'accueil pour la file d'attente ventes
announcement=custom/sales-welcome

; =========================================
; Classe avec playlist personnalisée (exemple)
; =========================================
; Cette classe permet de définir une liste précise de fichiers à jouer
;[custom-playlist]
;mode=playlist
;entry=/var/lib/asterisk/sounds/custom/song1
;entry=/var/lib/asterisk/sounds/custom/song2
;entry=/var/lib/asterisk/sounds/custom/song3
;sort=alpha

; =========================================
; NOTES IMPORTANTES:
; =========================================
; 1. Placez vos fichiers audio dans /var/lib/asterisk/moh/
; 2. Les formats supportés: wav, gsm, ulaw, alaw, mp3, etc.
; 3. Pour de meilleures performances, utilisez le format natif du codec (ulaw, alaw)
; 4. Les fichiers doivent être en mono, 8000 Hz pour la téléphonie standard
; 5. Vous pouvez utiliser sox pour convertir vos fichiers:
;    sox input.mp3 -r 8000 -c 1 -t wav output.wav
;
; 6. Structure des dossiers recommandée:
;    /var/lib/asterisk/
;      ├── moh/               (musique par défaut)
;      │   ├── song1.wav
;      │   ├── song2.wav
;      │   └── song3.wav
;      └── sounds/
;          └── custom/        (annonces personnalisées)
;              ├── support-welcome.wav
;              └── sales-welcome.wav

