[general]
static=yes
writeprotect=no
clearglobalvars=no
[default]
; Switch to the realtime database for any context that is not found statically.
; The context, extension, and priority will be passed to the realtime driver.
switch => Realtime
; =====================================================
; Contextes multi-tenant - Dialplan chargé depuis PostgreSQL
; =====================================================
; La plupart du dialplan est en realtime (table extensions)
; Seuls les contextes spéciaux restent ici (from-trunk, etc.)
; =====================================================
[client-a-context]
; Dialplan pour Client A - chargé depuis PostgreSQL via Realtime
switch => Realtime
[client-b-context]
; Dialplan pour Client B - chargé depuis PostgreSQL via Realtime
switch => Realtime
; ===== Contexte pour enregistrements (utilisé par MixMonitor) =====
[recordings]
exten => _X.,1,NoOp(Gestion des enregistrements)
 same => n,Hangup()
[from-trunk]
; Appels entrants routés vers Stasis
exten => _X.,1,NoOp(=== Appel entrant DID: ${EXTEN} ===)
 same => n,Set(DID=${EXTEN})
 same => n,Set(CALLERID=${CALLERID(num)})
 same => n,Stasis(ivr-app,${DID},${CALLERID})
 same => n,Hangup()
; Context utilisé par les Local channels vers les queues
[from-stasis]
; Accepter les noms de queues alphanumériques (ex: support_queues, t1_sales)
exten => _[a-zA-Z0-9_].,1,NoOp(=== Queue call from Stasis: ${EXTEN} ===)
 same => n,Queue(${EXTEN},tTcCr)
 same => n,Hangup()
; Accepter aussi les extensions numériques simples
exten => _X.,1,NoOp(=== Queue call from Stasis: ${EXTEN} ===)
 same => n,Queue(${EXTEN},tTcCr)
 same => n,Hangup()
switch => Realtime
