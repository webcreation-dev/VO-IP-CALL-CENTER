
[general]
static=yes
writeprotect=no
clearglobalvars=no

[default]
; Switch to the realtime database for any context that is not found statically.
; The context, extension, and priority will be passed to the realtime driver.
switch => Realtime

; Contextes multi-tenant - les extensions sont chargées depuis PostgreSQL
[client-a-context]
switch => Realtime

; ===== Extensions pour les appels internes Client A =====
; Appels directs entre utilisateurs
exten => _1XX,1,NoOp(Appel interne vers ${EXTEN})
 same => n,Set(CALLERID(name)=Agent ${CALLERID(num)})
 same => n,Dial(PJSIP/${EXTEN},30,TtWw)  ; T=transfert, W=enregistrement
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(unavail),Voicemail(${EXTEN}@default,u)
 same => n,Hangup()
 same => n(busy),Voicemail(${EXTEN}@default,b)
 same => n,Hangup()

; Extension 800 - Entrer dans la file d'attente support
exten => 800,1,NoOp(=== Entrée dans la file d'attente Support ===)
 same => n,Answer()
 same => n,Playback(queue-thankyou)  ; "Merci de patienter"
 same => n,Set(CHANNEL(musicclass)=default)
 same => n,Queue(support_queue,tTcC)  ; t=transfert agent, T=transfert appelant, c=continue, C=no position
 same => n,NoOp(Sortie de la queue: ${QUEUESTATUS})
 same => n,GotoIf($["${QUEUESTATUS}" = "TIMEOUT"]?timeout:unavail)
 same => n(timeout),Playback(queue-timeout)
 same => n,Voicemail(101@default,u)
 same => n,Hangup()
 same => n(unavail),Playback(queue-sorry)
 same => n,Hangup()

; Extension 801 - Entrer dans la file d'attente ventes
exten => 801,1,NoOp(=== Entrée dans la file d'attente Ventes ===)
 same => n,Answer()
 same => n,Playback(queue-thankyou)
 same => n,Set(CHANNEL(musicclass)=default)
 same => n,Queue(sales_queue,tTcC)
 same => n,NoOp(Sortie de la queue: ${QUEUESTATUS})
 same => n,Playback(queue-sorry)
 same => n,Hangup()

; Extension *65 - Consulter sa messagerie vocale
exten => *65,1,NoOp(=== Consultation messagerie vocale ===)
 same => n,Answer()
 same => n,VoicemailMain(${CALLERID(num)}@default)
 same => n,Hangup()

; Extension *66 - Mettre en pause dans la queue (agent)
exten => *66,1,NoOp(=== Mise en pause agent ${CALLERID(num)} ===)
 same => n,Answer()
 same => n,PauseQueueMember(support_queue,PJSIP/${CALLERID(num)})
 same => n,Playback(agent-paused)
 same => n,Hangup()

; Extension *67 - Reprendre service dans la queue (agent)
exten => *67,1,NoOp(=== Reprise service agent ${CALLERID(num)} ===)
 same => n,Answer()
 same => n,UnpauseQueueMember(support_queue,PJSIP/${CALLERID(num)})
 same => n,Playback(agent-unpaused)
 same => n,Hangup()

; Extension *68 - Statistiques de la queue (pour superviseurs)
exten => *68,1,NoOp(=== Statistiques queue support ===)
 same => n,Answer()
 same => n,SayNumber(${QUEUE_WAITING_COUNT(support_queue)})
 same => n,Playback(calls-waiting)
 same => n,Hangup()

[client-b-context]
switch => Realtime

; ===== Contexte pour les appels entrants du trunk opérateur =====
[from-trunk]
; L'opérateur envoie tous les appels pour le numéro business vers l'extension "s" (start).
; Nous acheminons l'appel vers la file d'attente "support_queue" avec IVR
exten => s,1,NoOp(=== Appel entrant du trunk opérateur ===)
 same => n,Set(CHANNEL(language)=fr)  ; Définir la langue en français
 same => n,Answer()
 same => n,Wait(1)  ; Attendre 1 seconde pour stabiliser l'appel
 same => n,Set(__DYNAMIC_FEATURES=automixmon)  ; Activer l'enregistrement à la demande
 same => n,Set(MONITOR_FILENAME=${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${UNIQUEID})
 same => n(ivr),Background(custom/welcome)  ; Menu vocal
 same => n,WaitExten(10)  ; Attendre 10 secondes pour un choix
 same => n,Goto(support)  ; Par défaut, aller au support

; Choix IVR
exten => 1,1,NoOp(Choix 1: Support technique)
 same => n,Goto(from-trunk,s,support)

exten => 2,1,NoOp(Choix 2: Service commercial)
 same => n,Goto(from-trunk,s,sales)

exten => 3,1,NoOp(Choix 3: Comptabilité)
 same => n,Dial(PJSIP/103,30,TtWw)
 same => n,Voicemail(103@default,u)
 same => n,Hangup()

exten => 9,1,NoOp(Choix 9: Répéter le menu)
 same => n,Goto(from-trunk,s,ivr)

; Timeout ou choix invalide
exten => i,1,NoOp(Choix invalide)
 same => n,Playback(invalid)
 same => n,Goto(from-trunk,s,ivr)

exten => t,1,NoOp(Timeout - Redirection vers support)
 same => n,Goto(from-trunk,s,support)

; Extension pour file d'attente support
exten => s,n(support),NoOp(=== Redirection vers file d'attente Support ===)
 same => n,Playback(queue-thankyou)
 same => n,Set(CHANNEL(musicclass)=default)
 same => n,Queue(support_queue,tTcCr)  ; r=ring au lieu de MOH
 same => n,NoOp(Sortie queue support: ${QUEUESTATUS})
 same => n,GotoIf($["${QUEUESTATUS}" = "TIMEOUT"]?noanswer:unavail)
 same => n(noanswer),Voicemail(101@default,u)
 same => n,Hangup()
 same => n(unavail),Playback(queue-sorry)
 same => n,Hangup()

; Extension pour file d'attente ventes
exten => s,n(sales),NoOp(=== Redirection vers file d'attente Ventes ===)
 same => n,Playback(queue-thankyou)
 same => n,Set(CHANNEL(musicclass)=default)
 same => n,Queue(sales_queue,tTcCr)
 same => n,NoOp(Sortie queue ventes: ${QUEUESTATUS})
 same => n,Playback(queue-sorry)
 same => n,Hangup()

; On rejette tous les autres appels (numéros aléatoires, etc.) pour la sécurité.
exten => _.,1,NoOp(Appel entrant non sollicité vers ${EXTEN} rejeté)
 same => n,Playback(ss-noservice)
 same => n,Hangup()

; ===== Contexte pour enregistrements (utilisé par MixMonitor) =====
[recordings]
exten => _X.,1,NoOp(Gestion des enregistrements)
 same => n,Hangup()
