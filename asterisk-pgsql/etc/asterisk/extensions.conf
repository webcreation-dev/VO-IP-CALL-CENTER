
[general]
static=yes
writeprotect=no
clearglobalvars=no

[default]
; Switch to the realtime database for any context that is not found statically.
; The context, extension, and priority will be passed to the realtime driver.
switch => Realtime

; Contextes multi-tenant - les extensions sont chargées depuis PostgreSQL
[client-a-context]
switch => Realtime

[client-b-context]
switch => Realtime

; ===== Contexte pour les appels entrants du trunk opérateur =====
[from-trunk]
; Quand quelqu'un appelle +22954150000, on redirige vers l'endpoint 101
; On accepte plusieurs formats : +22954150000, 22954150000, 54150000
exten => _54150000,1,NoOp(Appel entrant pour 54150000)
 same => n,Dial(PJSIP/101,60)
 same => n,Hangup()

exten => _22954150000,1,NoOp(Appel entrant pour 22954150000)
 same => n,Dial(PJSIP/101,60)
 same => n,Hangup()

exten => _+22954150000,1,NoOp(Appel entrant pour +22954150000)
 same => n,Dial(PJSIP/101,60)
 same => n,Hangup()

; On rejette tous les autres appels pour éviter les boucles
exten => _X.,1,NoOp(Appel entrant ${EXTEN} rejeté)
 same => n,Hangup()

; Si l'extension 101 ne répond pas
exten => _X.,n(noanswer),Voicemail(101@default,u)
 same => n,Hangup()
