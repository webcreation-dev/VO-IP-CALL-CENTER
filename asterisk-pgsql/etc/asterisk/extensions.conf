
[general]
static=yes
writeprotect=no
clearglobalvars=no

[default]
; Switch to the realtime database for any context that is not found statically.
; The context, extension, and priority will be passed to the realtime driver.
switch => Realtime

; Contextes multi-tenant - les extensions sont chargées depuis PostgreSQL
[client-a-context]
switch => Realtime

[client-b-context]
switch => Realtime

; ===== Contexte pour les appels entrants du trunk opérateur =====
[from-trunk]
; Quand quelqu'un appelle +22954150000, on redirige vers l'endpoint 101
exten => _X.,1,NoOp(Appel entrant vers ${EXTEN})
 same => n,Dial(PJSIP/101,60)
 same => n,Hangup()

; Si l'extension 101 ne répond pas
exten => _X.,n(noanswer),Voicemail(101@default,u)
 same => n,Hangup()
