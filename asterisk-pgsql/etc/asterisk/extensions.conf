
[general]
static=yes
writeprotect=no
clearglobalvars=no

[default]
; Switch to the realtime database for any context that is not found statically.
; The context, extension, and priority will be passed to the realtime driver.
switch => Realtime

; =====================================================
; Contextes multi-tenant - Dialplan chargé depuis PostgreSQL
; =====================================================
; La plupart du dialplan est en realtime (table extensions)
; Seuls les contextes spéciaux restent ici (from-trunk, etc.)
; =====================================================

[client-a-context]
; Dialplan pour Client A - chargé depuis PostgreSQL via Realtime
switch => Realtime

[client-b-context]
; Dialplan pour Client B - chargé depuis PostgreSQL via Realtime
switch => Realtime

; ===== Contexte pour les appels entrants du trunk opérateur =====
[from-trunk]
; L'opérateur envoie tous les appels pour le numéro business vers l'extension "s" (start)
; OU avec le numéro DID spécifique (ex: 103421233015269, 104421233015269, etc.)
; Nous acheminons TOUS les appels vers la file d'attente "support_queue"

; Extension "s" (appels sans DID spécifique)
exten => s,1,Goto(incoming,1)

; Pattern pour TOUS les numéros DID entrants (peu importe la longueur)
exten => _X.,1,Goto(incoming,1)

; Traitement commun de tous les appels entrants
exten => incoming,1,NoOp(=== Appel entrant du trunk - DID: ${EXTEN} - CallerID: ${CALLERID(num)} ===)
 same => n,Set(CHANNEL(language)=fr)
 same => n,Answer()
 same => n,Wait(1)
 same => n,NoOp(=== Redirection vers file d'attente Support ===)
 same => n,Playback(queue-thankyou)
 same => n,Set(CHANNEL(musicclass)=default)
 same => n,Queue(support_queue,tTcCr)
 same => n,NoOp(Sortie queue support: ${QUEUESTATUS})
 same => n,GotoIf($["${QUEUESTATUS}" = "TIMEOUT"]?noanswer:unavail)

 same => n(noanswer),NoOp(L'appel a expiré sans réponse de l'agent)
 same => n,Voicemail(101@default,u)
 same => n,Hangup()

 same => n(unavail),NoOp(Aucun agent n'était disponible ou l'appel a été rejeté)
 same => n,Playback(queue-sorry)
 same => n,Hangup()

; ===== Contexte pour enregistrements (utilisé par MixMonitor) =====
[recordings]
exten => _X.,1,NoOp(Gestion des enregistrements)
 same => n,Hangup()
