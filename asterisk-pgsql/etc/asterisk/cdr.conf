; Configuration générale pour CDR (Call Detail Records)
;
; Active l'enregistrement de tous les appels avec support multi-tenant

[general]
; Active le système CDR
enable=yes

; Enregistre les appels non répondus
unanswered=yes

; Enregistre les appels en congestion
congestion=yes

; Termine le CDR avant l'exécution de l'extension 'h'
; Permet de récupérer les valeurs end et billsec dans le dialplan
endbeforehexten=no

; Mode batch désactivé pour avoir les CDR en temps réel
batch=no

; Bloque le shutdown jusqu'à ce que tous les CDR soient enregistrés
safeshutdown=yes

; Active le logging CSV en plus de PostgreSQL (optionnel, pour backup)
[csv]
usegmtime=no
loguniqueid=yes
loguserfield=yes
accountlogs=yes
newcdrcolumns=yes

