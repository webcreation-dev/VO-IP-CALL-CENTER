<!DOCTYPE html>
<html>
  <head>
    <title>WebRTC Client Asterisk - Direct</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
      }
      h1 {
        color: #333;
      }
      .section {
        border: 1px solid #ddd;
        padding: 15px;
        margin: 15px 0;
        border-radius: 4px;
      }
      #status {
        padding: 10px;
        background-color: #f0f0f0;
        border-left: 4px solid #999;
        border-radius: 4px;
        font-weight: bold;
      }
      .input-group {
        margin: 10px 0;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input[type='text'],
      input[type='password'] {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        padding: 10px 20px;
        margin: 5px 5px 5px 0;
        cursor: pointer;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 14px;
      }
      button:hover {
        background-color: #0056b3;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
      .error {
        color: #d32f2f;
        margin-top: 10px;
      }
      .success {
        color: #388e3c;
        margin-top: 10px;
      }
      .info-box {
        background-color: #fff3e0;
        border-left: 4px solid #ff9800;
        padding: 10px;
        margin: 10px 0;
        border-radius: 4px;
        font-size: 13px;
      }
      audio {
        margin-top: 10px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>🎙️ Client SIP WebRTC pour Asterisk</h1>

    <div class="section">
      <h3>Configuration du serveur</h3>
      <div class="input-group">
        <label>Adresse du serveur Asterisk:</label>
        <input
          type="text"
          id="serverAddr"
          value="pishon.kabou.bj"
          placeholder="IP ou domaine"
        />
      </div>
      <div class="input-group">
        <label>Port WebSocket (wss):</label>
        <input type="text" id="serverPort" value="8089" placeholder="8089" />
      </div>
      <div class="input-group">
        <label>Votre numéro SIP:</label>
        <input type="text" id="sipUser" value="101" placeholder="Ex: 101" />
      </div>
      <div class="input-group">
        <label>Mot de passe:</label>
        <input
          type="password"
          id="sipPass"
          value="password101"
          placeholder="Mot de passe"
        />
      </div>
    </div>

    <div class="section">
      <h3>Connexion</h3>
      <div id="status">🔴 Déconnecté</div>
      <button id="connectBtn" onclick="connect()">Se connecter</button>
      <button id="disconnectBtn" onclick="disconnect()" disabled>
        Se déconnecter
      </button>
      <div id="errorMsg" class="error"></div>
    </div>

    <div class="section">
      <h3>Appels</h3>
      <div class="input-group">
        <label>Numéro à appeler:</label>
        <input type="text" id="callNumber" placeholder="Ex: 102" />
      </div>
      <button id="callBtn" onclick="makeCall()" disabled>Appeler</button>
      <button id="hangupBtn" onclick="hangUp()" disabled>Raccrocher</button>
      <div id="successMsg" class="success"></div>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <div class="section">
      <h3>🐛 Logs de Debug</h3>
      <div
        id="debugLogs"
        style="
          background-color: #000;
          color: #0f0;
          padding: 10px;
          font-family: monospace;
          font-size: 12px;
          height: 300px;
          overflow-y: auto;
          border-radius: 4px;
        "
      ></div>
      <button
        onclick="document.getElementById('debugLogs').innerHTML = ''; log('🗑️ Logs effacés');"
      >
        Effacer les logs
      </button>
    </div>

    <script src="./jssip-3.10.0.min.js"></script>

    <div class="info-box">
      <strong>ℹ️ Note:</strong> Cette application se connecte directement au
      serveur Asterisk via WebSocket et WebRTC.<br />
      Assurez-vous que Asterisk accepte les connexions WebSocket sur le port
      8089.
    </div>

    <script>
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const statusDiv = document.getElementById('status');
      const connectBtn = document.getElementById('connectBtn');
      const disconnectBtn = document.getElementById('disconnectBtn');
      const callBtn = document.getElementById('callBtn');
      const hangupBtn = document.getElementById('hangupBtn');

      let ua = null;
      let currentSession = null;

      // Fonction pour configurer les handlers sur la RTCPeerConnection
      function setupPeerConnectionHandlers(peerconnection) {
        log('🔵 Configuration des handlers sur RTCPeerConnection');

        // Log de la configuration ICE
        log('🔵 ICE Gathering State: ' + peerconnection.iceGatheringState);
        log('🔵 ICE Connection State: ' + peerconnection.iceConnectionState);
        log('🔵 Signaling State: ' + peerconnection.signalingState);

        // Écouter les changements d'état ICE
        peerconnection.oniceconnectionstatechange = () => {
          log(
            '🔵 ICE Connection State changé: ' +
              peerconnection.iceConnectionState
          );
        };

        peerconnection.onicegatheringstatechange = () => {
          log(
            '🔵 ICE Gathering State changé: ' + peerconnection.iceGatheringState
          );
        };

        // Remplacer l'événement déprécié 'addstream' par le moderne 'track'
        peerconnection.ontrack = event => {
          log(`🎵 Track reçu: ${event.track.kind}`);
          log(`🎵 Track enabled: ${event.track.enabled}`);
          log(`🎵 Track muted: ${event.track.muted}`);
          log(`🎵 Track readyState: ${event.track.readyState}`);
          log(
            `🎵 Nombre de streams: ${event.streams ? event.streams.length : 0}`
          );

          if (event.streams && event.streams[0]) {
            const stream = event.streams[0];
            log(`🎵 Stream ID: ${stream.id}`);
            log(`🎵 Stream active: ${stream.active}`);
            log(`🎵 Stream tracks: ${stream.getTracks().length}`);

            // IMPORTANT : Forcer le unmute du track si nécessaire
            event.track.enabled = true;
            if (event.track.muted) {
              log('⚠️ Track est muted, tentative de correction...');
              // Le track peut être muted temporairement, on attend qu'il se unmute
              event.track.onunmute = () => {
                log('✅ Track unmuted !');
              };
            }

            const audioEl = document.getElementById('remoteAudio');
            audioEl.srcObject = stream;

            // Vérifier l'élément audio
            log(`🔊 Audio element volume: ${audioEl.volume}`);
            log(`🔊 Audio element muted: ${audioEl.muted}`);
            log(`🔊 Audio element paused: ${audioEl.paused}`);

            // Forcer le play
            audioEl
              .play()
              .then(() => {
                log('✅ Audio.play() réussi');
              })
              .catch(err => {
                log('❌ Audio.play() échoué: ' + err.message);
              });

            // Écouter les événements de l'audio
            audioEl.onloadedmetadata = () => {
              log('✅ Audio metadata chargées');
            };

            audioEl.onplaying = () => {
              log('✅ Audio en cours de lecture');
            };

            audioEl.onerror = e => {
              log('❌ Erreur audio: ' + e.message);
            };

            // Afficher les stats WebRTC toutes les 3 secondes
            const statsInterval = setInterval(() => {
              if (!currentSession) {
                clearInterval(statsInterval);
                return;
              }

              peerconnection.getStats(null).then(stats => {
                stats.forEach(report => {
                  if (
                    report.type === 'inbound-rtp' &&
                    report.kind === 'audio'
                  ) {
                    log(
                      `📊 Stats Audio Entrant - Paquets: ${report.packetsReceived}, Perdus: ${report.packetsLost}, Jitter: ${report.jitter}`
                    );
                  }
                });
              });
            }, 3000);
          }
        };
      }

      // Fonction pour attacher les événements média à une session
      function attachMediaHandlers(session) {
        log('🔧 Attachement des handlers média à la session');

        // Debug : voir ce qui est disponible sur la session
        log('🔍 Session properties: ' + Object.keys(session).join(', '));
        log(
          '🔍 Session.connection: ' + (session.connection ? 'EXISTS' : 'NULL')
        );

        // Si la connection existe déjà, l'attacher directement
        if (session.connection) {
          log(
            '✨ Connection RTCPeerConnection déjà disponible, attachement direct'
          );
          setupPeerConnectionHandlers(session.connection);
        }

        session.on('peerconnection', data => {
          log('🔵 Événement peerconnection déclenché');
          const peerconnection = data.peerconnection;
          setupPeerConnectionHandlers(peerconnection);
        });

        session.on('ended', () => {
          log('Session terminée');
          statusDiv.textContent = '🟢 Enregistré';
          currentSession = null;
          updateUI();
        });

        session.on('failed', data => {
          log('Session échouée: ' + data.cause);
          showError("L'appel a échoué: " + data.cause);
          statusDiv.textContent = '🟢 Enregistré';
          currentSession = null;
          updateUI();
        });

        session.on('accepted', () => {
          log('Appel accepté');
          statusDiv.textContent = `📞 En appel avec ${session.remote_identity.uri.user}`;
          updateUI();
        });
      }

      function log(msg) {
        const timestamp = new Date().toLocaleTimeString();
        const fullMsg = `[${timestamp}] ${msg}`;
        console.log('[SIP] ' + fullMsg);

        // Afficher aussi dans la zone de debug
        const debugDiv = document.getElementById('debugLogs');
        if (debugDiv) {
          const logLine = document.createElement('div');
          logLine.textContent = fullMsg;
          debugDiv.appendChild(logLine);
          // Auto-scroll vers le bas
          debugDiv.scrollTop = debugDiv.scrollHeight;
        }
      }

      function showError(msg) {
        errorMsg.textContent = '❌ ' + msg;
        console.error(msg);
      }

      function showSuccess(msg) {
        successMsg.textContent = '✅ ' + msg;
        console.log(msg);
      }

      function updateUI() {
        const isRegistered = ua && ua.isRegistered();
        const isConnected = ua && ua.isConnected();

        connectBtn.disabled = isConnected;
        disconnectBtn.disabled = !isConnected;
        callBtn.disabled = !isRegistered || currentSession;
        hangupBtn.disabled = !isRegistered || !currentSession;

        if (!isConnected) {
          statusDiv.textContent = '🔴 Déconnecté';
        }
      }

      function connect() {
        errorMsg.textContent = '';
        successMsg.textContent = '';

        const server = document.getElementById('serverAddr').value;
        const port = document.getElementById('serverPort').value;
        const user = document.getElementById('sipUser').value;
        const pass = document.getElementById('sipPass').value;

        if (!server || !port || !user || !pass) {
          showError('Remplissez tous les champs');
          return;
        }

        log('🚀 Démarrage connexion SIP');
        log('🚀 Serveur: ' + server + ':' + port);
        log('🚀 Utilisateur: ' + user);

        // Vérifier les permissions média
        navigator.mediaDevices
          .getUserMedia({ audio: true, video: false })
          .then(stream => {
            log('✅ Permissions microphone accordées');
            log('✅ Nombre de tracks audio: ' + stream.getAudioTracks().length);
            stream.getTracks().forEach(track => {
              log('✅ Track: ' + track.kind + ' - ' + track.label);
              track.stop(); // On arrête pour le moment, JsSIP le redémarrera
            });
          })
          .catch(err => {
            log('❌ Erreur permissions microphone: ' + err.message);
          });

        try {
          const socket = new JsSIP.WebSocketInterface(
            `wss://${server}:${port}/ws`
          );

          const configuration = {
            sockets: [socket],
            uri: `sip:${user}@${server}`,
            password: pass,
            register: true,
            display_name: user,
            pcConfig: {
              iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
            },
          };

          ua = new JsSIP.UA(configuration);

          ua.on('connecting', () => {
            log('Connexion en cours...');
            statusDiv.textContent = '🟡 Connexion en cours...';
            updateUI();
          });

          ua.on('connected', () => {
            log('Connecté via WebSocket');
            updateUI();
          });

          ua.on('disconnected', () => {
            log('Déconnecté');
            showError('Déconnecté du serveur');
            ua = null;
            updateUI();
          });

          ua.on('registered', () => {
            log('Enregistré avec succès');
            showSuccess('Enregistré auprès du serveur Asterisk');
            statusDiv.textContent = '🟢 Enregistré';
            updateUI();
          });

          ua.on('unregistered', () => {
            log('Désenregistré');
            showError('Désenregistré du serveur');
            ua = null;
            updateUI();
          });

          ua.on('registrationFailed', ev => {
            log("Échec de l'enregistrement: " + ev.cause);
            showError("Échec de l'enregistrement: " + ev.cause);
            ua = null;
            updateUI();
          });

          ua.on('newRTCSession', data => {
            const session = data.session;
            log(`📞 Nouvelle session: ${session.direction}`);

            if (currentSession) {
              log('⚠️ Session déjà en cours, rejet de la nouvelle session.');
              session.terminate({
                status_code: 486,
                reason_phrase: 'Busy Here',
              });
              return;
            }

            currentSession = session;

            if (session.direction === 'incoming') {
              log(`📞 Appel entrant de ${session.remote_identity.uri.user}`);
              statusDiv.textContent = `📞 Appel entrant de ${session.remote_identity.uri.user}. Décrochez...`;
              // Pour un test, on décroche automatiquement.
              // Dans une vraie application, on demanderait à l'utilisateur.
              session.answer({
                mediaConstraints: { audio: true, video: false },
              });
            }

            // Attacher les handlers média
            attachMediaHandlers(session);

            updateUI();
          });

          ua.start();
        } catch (e) {
          showError('Erreur de configuration: ' + e.message);
          ua = null;
          updateUI();
        }
      }

      function disconnect() {
        if (ua) {
          ua.stop();
        }
      }

      function makeCall() {
        const target = document.getElementById('callNumber').value;
        if (!target || !ua) {
          showError("Entrez un numéro et assurez-vous d'être connecté.");
          return;
        }

        if (currentSession) {
          showError('Un appel est déjà en cours.');
          return;
        }

        log('📞 Démarrage appel vers: ' + target);

        const eventHandlers = {
          progress: function (e) {
            log('📞 Appel en cours...');
          },
          failed: function (e) {
            log('❌ Échec appel: ' + e.cause);
            showError("Échec de l'appel: " + e.cause);
            currentSession = null;
            updateUI();
          },
          ended: function (e) {
            log('📞 Appel terminé: ' + e.cause);
            currentSession = null;
            updateUI();
          },
          confirmed: function (e) {
            log('✅ Appel confirmé');
          },
        };

        const options = {
          eventHandlers: eventHandlers,
          mediaConstraints: { audio: true, video: false },
        };

        try {
          const session = ua.call(
            `sip:${target}@${ua.configuration.uri.host}`,
            options
          );

          if (session) {
            log('📞 Session créée avec succès');
            currentSession = session;

            // IMPORTANT : Attacher les handlers IMMÉDIATEMENT
            // pour les appels sortants, car l'événement peerconnection
            // peut se déclencher AVANT newRTCSession
            attachMediaHandlers(session);
            updateUI();
          }
        } catch (err) {
          log("❌ Erreur lors de la création de l'appel: " + err.message);
          showError('Erreur: ' + err.message);
        }
      }

      function hangUp() {
        if (currentSession) {
          currentSession.terminate();
        }
      }

      // Déconnexion propre en fermant la page
      window.onbeforeunload = () => {
        if (ua) {
          ua.stop();
        }
      };
    </script>
  </body>
</html>
